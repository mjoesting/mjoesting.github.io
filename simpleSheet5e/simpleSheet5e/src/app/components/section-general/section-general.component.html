<div class="section-title">
    <h2>General Info</h2>
</div>
<div [formGroup]="generalForm" class="section-content">
    <div class="row add-gap add-margin-bottom">
        <div class="field-wrapper column">
            <h4>Name</h4>
            <div class="input-wrapper">
                <input type="text" id="general-name" formControlName="name" [value]="generalForm.controls.name!.value" />
            </div>
        </div>
        <div class="field-wrapper column">
            <h4>Player</h4>
            <div class="input-wrapper">
                <input type="text" id="general-player" formControlName="player" [value]="generalForm.controls.player!.value" />
            </div>
        </div>
    </div>
    <div class="row add-gap add-margin-bottom">
        <div class="field-wrapper column">
            <h4>Species</h4>
            <div class="input-wrapper">
                <input type="text" id="general-species" formControlName="species" [value]="generalForm.controls.species!.value" />
            </div>
        </div>
        <div class="field-wrapper column">
            <h4>Background</h4>
            <div class="input-wrapper">
                <input type="text" id="general-background" formControlName="background" [value]="generalForm.controls.background!.value" />
            </div>
        </div>
    </div>
    <div class="field-wrapper column grow" id="general-class">
        <div class="column flex-start add-gap add-margin-bottom">
            <h3 class="shrink">Classes</h3>
            <div class="input-wrapper">
                <textarea id="general-classes" formControlName="classes">{{ generalForm.controls.classes!.value }}</textarea>
            </div>
            <!-- <div class="input-wrapper shrink">
                <app-button id="add-class" [label]="'+'" [onClick]="handleAddClass"></app-button>
            </div> -->
        </div>
