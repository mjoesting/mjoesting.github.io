
<div class="section-title">
    <h2>Abilities</h2>
</div>
<div formGroupName="SectionAbilities" class="section-content flex-space-between">
    <div class="row center add-gap border-bottom add-margin-bottom">
        <h5>Name</h5>
        <h5>Score</h5>
        <h5>Bonus</h5>
        <h5>Custom Bonus</h5>
    </div>
    @for (a of abilitiesData; track a.ability) {
        <div formGroupName="a" class="row">
            <div class="row center add-gap add-margin-bottom">
                <h4>{{ a.ability }}</h4>
                <div class="field-wrapper">
                    <div class="input-wrapper">
                        <input type="text" id="abilities-{{ a.ability }}" formControlName="form[a.ability].score" [value]="a.score" />
                    </div>
                </div>
                <div class="field-wrapper">
                    <div class="input-wrapper">
                        <input type="text" id="abilities-{{ a.ability }}-mod" formControlName="form[a.ability.bonus]" [value]="a.bonus" />
                    </div>
                </div>
                <div class="field-wrapper">
                    <div class="input-wrapper">
                        <input type="text" id="abilities-{{ a.ability }}-custom" formControlName="form[a.ability].customBonusModifiedBy" [value]="a.customBonusModifiedBy" />
                    </div>
                </div>
            </div>
        </div>
    }
</div>
